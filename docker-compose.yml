version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: localai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_DB=n8n
    volumes:
      - D:\LocalAI\postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: localai-qdrant
    restart: unless-stopped
    volumes:
      - D:\LocalAI\qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  n8n:
    image: n8nio/n8n:latest
    container_name: localai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENCRYPTION_KEY=your-random-encryption-key
      - N8N_AI_ENABLED=true
      - N8N_AI_PROVIDER=ollama
      - N8N_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - N8N_AI_OLLAMA_MODEL=dolphin3:8b-q4_K_M
    volumes:
      - D:\LocalAI\n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
